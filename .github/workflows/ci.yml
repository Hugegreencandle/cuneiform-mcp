name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript strict)
        run: npm run build

      - name: Smoke test (all tools register + envelope contract)
        run: npm run smoke

      - name: Cache-independent unit audit (round 17 — validation-resolutions)
        run: node scripts/round17-validation-resolutions-audit.mjs

      # Round-18 (identify_composition) is cache-dependent (signs +
      # chunk index + sign embeddings). Skipped in CI until the
      # cache-bootstrap orchestration lands in v0.33+.
