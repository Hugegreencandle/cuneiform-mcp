name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript strict)
        run: npm run build

      - name: Smoke test (all tools register + envelope contract)
        run: npm run smoke

      - name: Cache-independent unit audit (round 17 — validation-resolutions)
        run: node scripts/round17-validation-resolutions-audit.mjs

      # Rounds 18 (identify_composition) and 19's integration tests are
      # cache-dependent (signs + chunk index + sign embeddings). Skipped
      # in CI until cache-bootstrap orchestration lands. Round 19's UNIT
      # tests (Newick parser + rerooter on a synthetic 4-leaf tree) ARE
      # cache-independent, but the audit script runs both phases — we'd
      # need to split them to selectively run only the unit half. v0.34+.
